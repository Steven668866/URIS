name: Platform Checks

on:
  push:
    paths:
      - "src/uris_platform/**"
      - "tests/**"
      - "scripts/**"
      - "app.py"
      - ".github/workflows/platform-checks.yml"
  pull_request:
    paths:
      - "src/uris_platform/**"
      - "tests/**"
      - "scripts/**"
      - "app.py"
      - ".github/workflows/platform-checks.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: python -m pip install --upgrade pip pytest
      - name: Run core platform tests
        run: pytest tests/test_platform_config.py tests/test_scenario_engine.py tests/test_state_init.py -q
      - name: Run project doctor
        run: python scripts/project_doctor.py
